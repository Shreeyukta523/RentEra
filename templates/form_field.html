<div class="form-field-wrapper">
    <div class="form-outline">
        {{ field }}
        <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
        {% if field.errors %}
            {% for error in field.errors %}
                <span class="error-message">{{ error }}</span>
            {% endfor %}
        {% endif %}
    </div>
</div>
